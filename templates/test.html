<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steganography Detection Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #0a0c10 0%, #1a1e2a 100%);
      min-height: 100vh;
      color: #d1d5db;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
    }

    .test-card {
      background: linear-gradient(45deg, #1a1e2a, #2a4365);
      border: 1px solid rgba(74, 85, 104, 0.5);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      padding: 40px;
    }

    h1 {
      color: #d1d5db;
      text-align: center;
      margin-bottom: 30px;
      font-size: 2.5rem;
    }

    .upload-area {
      border: 3px dashed #6b46c1;
      border-radius: 10px;
      padding: 60px 20px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      background: rgba(107, 70, 193, 0.05);
    }

    .upload-area:hover {
      border-color: #4c51bf;
      background: rgba(107, 70, 193, 0.1);
    }

    .upload-area.dragover {
      border-color: #4c51bf;
      background: rgba(107, 70, 193, 0.2);
    }

    .upload-icon {
      font-size: 4rem;
      color: #6b46c1;
      margin-bottom: 20px;
    }

    #fileInput {
      display: none;
    }

    .btn-upload {
      background: linear-gradient(45deg, #4c51bf, #6b46c1);
      border: none;
      color: #d1d5db;
      padding: 12px 30px;
      font-size: 1.1rem;
      border-radius: 8px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-upload:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(76, 81, 191, 0.5);
    }

    .preview-container {
      margin-top: 30px;
      text-align: center;
      display: none;
    }

    .preview-image {
      max-width: 100%;
      max-height: 400px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
      margin-bottom: 20px;
    }

    .result-container {
      margin-top: 30px;
      padding: 25px;
      border-radius: 10px;
      display: none;
    }

    .result-clean {
      background: linear-gradient(45deg, #065f46, #047857);
      border: 2px solid #10b981;
    }

    .result-stegano {
      background: linear-gradient(45deg, #991b1b, #dc2626);
      border: 2px solid #ef4444;
    }

    .result-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .result-text {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .result-prob {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .result-meta {
      margin-top: 10px;
      font-size: 0.95rem;
      opacity: 0.9;
      line-height: 1.45;
    }

    .loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

    .spinner {
      border: 4px solid rgba(107, 70, 193, 0.3);
      border-top: 4px solid #6b46c1;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: linear-gradient(45deg, #4c51bf, #6b46c1);
      color: #d1d5db;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      transition: transform 0.3s ease;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      color: #fff;
    }

    .error-message {
      background: #991b1b;
      color: #fff;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <a href="http://127.0.0.1:5000/" class="back-btn">
    <i class="fas fa-arrow-left"></i> Back to Home
  </a>

  <div class="container">
    <div class="test-card">
      <h1><i class="fas fa-microscope"></i> Steganography Detection</h1>
      <p class="text-center mb-4" style="color: #a0aec0;">Upload an image to check if it contains hidden steganographic data</p>

      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">
          <i class="fas fa-cloud-upload-alt"></i>
        </div>
        <h3 style="color: #a0aec0;">Drag & Drop your image here</h3>
        <p style="color: #718096;">or</p>
        <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">
          Browse Files
        </button>
        <input type="file" id="fileInput" accept="image/*">
        <p class="mt-3" style="font-size: 0.9rem; color: #718096;">
          Supported formats: JPG, JPEG (max 5MB)
        </p>
      </div>

      <div class="preview-container" id="previewContainer">
        <img id="previewImage" class="preview-image" alt="Preview">
        <div>
          <button class="btn btn-upload" id="analyzeBtn">
            <i class="fas fa-search"></i> Analyze Image
          </button>
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p class="mt-3">Analyzing image...</p>
      </div>

      <div class="error-message" id="errorMessage"></div>

      <div class="result-container" id="resultContainer">
        <div class="text-center">
          <div class="result-icon" id="resultIcon"></div>
          <div class="result-text" id="resultText"></div>
          <div class="result-prob" id="resultProb"></div>
          <div class="result-meta" id="resultMeta"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const previewContainer = document.getElementById('previewContainer');
    const previewImage = document.getElementById('previewImage');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loading = document.getElementById('loading');
    const resultContainer = document.getElementById('resultContainer');
    const errorMessage = document.getElementById('errorMessage');
    const resultMeta = document.getElementById('resultMeta');
    let selectedFile = null;

    // Drag and drop handlers
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFile(files[0]);
      }
    });

    // File input handler
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFile(e.target.files[0]);
      }
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showError('Please select an image file');
        return;
      }

      const ext = file.name.split('.').pop()?.toLowerCase();
      if (!ext || !['jpg', 'jpeg'].includes(ext)) {
        showError('Only JPG/JPEG images are supported by the current model endpoint');
        return;
      }

      if (file.size > 5 * 1024 * 1024) {
        showError('File size exceeds 5MB limit');
        return;
      }

      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        previewImage.src = e.target.result;
        previewContainer.style.display = 'block';
        resultContainer.style.display = 'none';
        errorMessage.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    // Analyze button handler
    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) {
        showError('Please select an image first');
        return;
      }

      const formData = new FormData();
      formData.append('image', selectedFile);

      loading.style.display = 'block';
      resultContainer.style.display = 'none';
      errorMessage.style.display = 'none';
      analyzeBtn.disabled = true;

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        loading.style.display = 'none';
        analyzeBtn.disabled = false;

        if (response.ok) {
          showResult(data);
        } else {
          showError(data.error || 'An error occurred during analysis');
        }
      } catch (error) {
        loading.style.display = 'none';
        analyzeBtn.disabled = false;
        showError('Failed to connect to server: ' + error.message);
      }
    });

    function showResult(data) {
      const resultIcon = document.getElementById('resultIcon');
      const resultText = document.getElementById('resultText');
      const resultProb = document.getElementById('resultProb');

      if (data.is_suspicious) {
        resultContainer.className = 'result-container result-stegano';
        resultIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
        resultText.textContent = 'Steganography Detected!';
      } else {
        resultContainer.className = 'result-container result-clean';
        resultIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
        resultText.textContent = 'Image is Clean';
      }

      resultProb.textContent = `Confidence: ${Number(data.confidence).toFixed(1)}%`;
      resultMeta.innerHTML = `
        Clean Probability: ${Number(data.probability?.clean ?? 0).toFixed(1)}%<br>
        Stego Probability: ${Number(data.probability?.stego ?? 0).toFixed(1)}%<br>
        Risk Level: ${data.risk_level || 'N/A'} | Inference Time: ${Number(data.inference_ms ?? 0).toFixed(1)} ms
      `;
      resultContainer.style.display = 'block';
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
    }
  </script>
</body>
</html>
